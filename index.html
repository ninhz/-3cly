<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mê chị Cẩm Ly 💖</title>
<style>
  html,body{
    margin:0; padding:0;
    height:100%;
    overflow:hidden;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:'Segoe UI',sans-serif;
  }
  h1{
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    font-size:4em;
    color:#fff;
    text-shadow:0 0 20px #ff3f8e, 0 0 40px #ff3f8e;
    animation: glow 2s ease-in-out infinite alternate;
    cursor: default;
  }
  @keyframes glow {
    from { text-shadow:0 0 10px #ff3f8e,0 0 20px #ff3f8e; }
    to   { text-shadow:0 0 30px #ff3f8e,0 0 60px #ff3f8e; }
  }
  .heart{
    position:fixed;
    width:20px;
    height:20px;
    background:pink;
    transform:rotate(45deg);
    opacity:0.8;
    animation: float 6s linear forwards;
  }
  .heart:before,
  .heart:after{
    content:'';
    position:absolute;
    width:20px;
    height:20px;
    background:pink;
    border-radius:50%;
  }
  .heart:before{ top:-10px; left:0; }
  .heart:after { left:-10px; top:0; }
  @keyframes float {
    0%   { transform:translateY(0) rotate(45deg); opacity:1; }
    100% { transform:translateY(-120vh) rotate(45deg); opacity:0; }
  }
</style>
</head>
<body>
  <h1>nhớ chị iêu lắm ạ:>>  💖</h1>

<script>
  // Tạo tim bay ngẫu nhiên
  function createHeart(){
    const heart=document.createElement('div');
    heart.className='heart';
    heart.style.left=Math.random()*100+'vw';
    heart.style.background=`hsl(${Math.random()*360},70%,80%)`;
    heart.style.width=heart.style.height=20+Math.random()*20+'px';
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),6000);
  }
  setInterval(createHeart,300);

  // Click chuột hiện tim to
  document.addEventListener('click', e=>{
    const heart=document.createElement('div');
    heart.className='heart';
    heart.style.left=e.clientX+'px';
    heart.style.top=e.clientY+'px';
    heart.style.background='red';
    heart.style.width=heart.style.height='40px';
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),6000);
  });
</script>
</body>
</html>
